<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>营造有道 | 御灾有术</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%; height: 100%;
            font-family: "FZXiaoBiaoSong-B05S";
            overflow: hidden;
            background-color: #ffffff;
        }

        .container {
            position: relative; width: 100vw; height: 100vh;
        }

        .scene {
            position: absolute; top: 0; left: 0;
            width: 100vw; height: 100vh;
            background-color: #ffffff;
            opacity: 0; visibility: hidden;
            transition: opacity 0.6s linear, visibility 0s 0.6s;
            display: flex; align-items: center; justify-content: center;
            text-align: center; overflow: hidden;
        }
        .scene.active {
            opacity: 1; visibility: visible;
            transition: opacity 0.6s linear, visibility 0s 0s;
        }


        .scene::before {
            content: '';
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("底纹.png"), url("点阵装饰.png");
            background-position: center; background-size: cover;
            background-repeat: no-repeat; opacity: 0.5; z-index: 0;
        }

        #scene2 .video-bg {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%; object-fit: cover; z-index: 0;
        }
        #scene2 .content {
            position: relative; z-index: 1;
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; height: 100%; padding: 0 40px;
        }


        .scroll-btn {
            position: absolute; bottom: 80px; left: 50%;
            transform: translateX(-50%);
            width: 100px; height: 40px; cursor: pointer;
            z-index: 30; opacity: 0;
            transition: opacity 0.5s ease; pointer-events: none;
        }
        .scroll-btn.show {
            opacity: 1; pointer-events: auto;
            animation: breathe 2s infinite;
        }
        .scroll-btn img { width: 100%; height: 100%; object-fit: contain; }

        @keyframes breathe {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.1); }
            100% { transform: translateX(-50%) scale(1); }
        }

        .long-image-overlay {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            overflow-y: auto;         
            -webkit-overflow-scrolling: touch;
            opacity: 0; visibility: hidden;
            transition: opacity 0.5s ease, visibility 0s 0.5s;
        }
        .long-image-overlay.show {
            opacity: 1; visibility: visible;
            transition: opacity 0.5s ease, visibility 0s 0s;
        }

        .long-image-wrapper {
            position: relative; width: 100%;
        }
        .long-image-wrapper img {
            width: 100%; height: auto; display: block;
        }


        .group161 {
            position: absolute; bottom: 35px; left: 50%;
            transform: translateX(-50%);
            display: flex; align-items: flex-start; justify-content: space-between;
            width: 100%; max-width: 1050px;
            height: 91px; z-index: 30;
            box-sizing: border-box; padding: 0 10px;
        }
        .vector33 {
            margin-top: 46px; width: 556px; height: 1px;
            background-image: linear-gradient(90deg,
                rgba(113,108,108,0.15) 0%,
                rgba(111,96,96,0.375) 33.65%,
                rgba(107,75,75,1) 100%);
        }
        .rectangle134 {
            display: flex; align-items: center;
            border: 1px solid #716c6c; padding: 7px;
        }
        .rectangle132 {
            display: flex; flex-grow: 1; align-items: center;
            box-shadow: 0px 4px 4px 0px rgba(103,92,92,0.25);
            background: #8c8686; padding: 11px;
            cursor: pointer; transition: transform 0.6s ease;
        }
        .rectangle132:hover { transform: rotate(180deg); }
        .rectangle132 .btn-text {
            display: flex; align-items: center; justify-content: center;
            width: 53px; height: 53px; line-height: 80px;
            letter-spacing: 0; color: #ffffff;
            font-family: "FZXiaoBiaoSong-B05S";
            font-size: 36px; margin: 0;
            transition: transform 0.6s ease;
        }
        .rectangle132:hover .btn-text { transform: rotate(-180deg); }
        .vector34 {
            margin-top: 46px; width: 556px; height: 1px;
            transform: rotate(180deg);
            background-image: linear-gradient(90deg,
                rgba(113,108,108,0.15) 0%,
                rgba(111,96,96,0.375) 33.65%,
                rgba(107,75,75,1) 100%);
        }
    </style>
</head>
<body>
    <div class="container">
        <div id="scene1" class="scene active"></div>

        <div id="scene2" class="scene">
            <video class="video-bg" id="myVideo" muted playsinline preload="auto">
                <source src="防震.mp4" type="video/mp4">
            </video>
            <div class="content"></div>
            <div class="scroll-btn" id="frameButton" onclick="openLongImage()">
                <img src="Frame 28.png" alt="打开长图">
            </div>
        </div>
    </div>

    <div class="long-image-overlay" id="longImageOverlay">
        <div class="long-image-wrapper">
            <img src="地灾篇——抗震演示.png" alt="详细内容长图">
            <div class="group161">
                <div class="vector33"></div>
                <div class="rectangle134">
                    <div class="rectangle132" onclick="window.location.href='page1.html'">
                        <p class="btn-text">返</p>
                    </div>
                </div>
                <div class="vector34"></div>
            </div>
        </div>
    </div>

    <script>
        const scene1 = document.getElementById('scene1');
        const scene2 = document.getElementById('scene2');
        const video = document.getElementById('myVideo');
        const frameBtn = document.getElementById('frameButton');
        const longImageOverlay = document.getElementById('longImageOverlay');
        let currentScene = 1;
        let videoRevealed = false;

        function switchToScene(index) {
            if (index === currentScene) return;
            if (index === 1) {
                scene1.classList.add('active');
                scene2.classList.remove('active');
                video.pause();
                currentScene = 1;
                frameBtn.classList.remove('show');
                videoRevealed = false;
            } else if (index === 2) {
                scene1.classList.remove('active');
                scene2.classList.add('active');
                video.currentTime = 0;
                video.play();
                currentScene = 2;
                frameBtn.classList.remove('show');
                videoRevealed = false;
            }
        }

        function showButton() {
            if (!videoRevealed) {
                frameBtn.classList.add('show');
                videoRevealed = true;
            }
        }

        function openLongImage() { longImageOverlay.classList.add('show'); }
        function closeLongImage() { longImageOverlay.classList.remove('show'); }


        window.addEventListener('wheel', (e) => {
            if (longImageOverlay.classList.contains('show')) {
                return; 
            }
            e.preventDefault();
            const isDown = e.deltaY > 0;
            if (currentScene === 1) {
                if (isDown) switchToScene(2);
            } else if (currentScene === 2) {
                if (isDown) showButton();
                else switchToScene(1);
            }
        }, { passive: false });


        let touchStartY = 0;
        window.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; }, { passive: false });
        window.addEventListener('touchend', (e) => {

            if (longImageOverlay.classList.contains('show')) return;
            const diff = touchStartY - e.changedTouches[0].clientY;
            if (Math.abs(diff) < 30) return;
            const isDown = diff > 0;
            if (currentScene === 1) {
                if (isDown) switchToScene(2);
            } else if (currentScene === 2) {
                if (isDown) showButton();
                else switchToScene(1);
            }
        });

        scene2.addEventListener('click', () => {
            if (currentScene === 2) showButton();
        });


        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && longImageOverlay.classList.contains('show')) {
                closeLongImage();
            }
        });

        longImageOverlay.addEventListener('click', function(e) {
            if (e.target === longImageOverlay) closeLongImage();
        });
    </script>
</body>
</html>
