<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>营造有道 | 御灾有术</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            font-family: "FZXiaoBiaoSong-B05S", "SimSun", serif;
            background-color: #F5F1EB;
            overflow: hidden;
        }
        .page {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }
        .page-1 {
            transform: translateY(0);
            opacity: 1;
            background-image: url("底纹.png"), url("点阵装饰.png");
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .page-1 .top-left-image {
            position: absolute;
            top: 1px;
            left: 5px;
            width: 800px;
            height: 600px;
            z-index: 0;
        }
        .page-1 .top-left-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .page-1 .title-main {
            font-size: 64px;
            color: #222;
            letter-spacing: 8px;
            margin-bottom: 20px;
            z-index: 1;
        }
        .page-1 .title-sub {
            font-size: 32px;
            color: #444;
            letter-spacing: 4px;
            margin-bottom: 40px;
            z-index: 1;
        }
        .page-1 .divider {
            width: 700px;
            height: 1px;
            background: #666;
            margin-bottom: 40px;
            position: relative;
            z-index: 1;
        }
        .page-1 .divider::after {
            content: "";
            width: 12px;
            height: 12px;
            background: #666;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(45deg);
        }
        .page-1 .desc {
            font-size: 24px;
            color: #444;
            line-height: 2;
            text-align: center;
            z-index: 1;
        }
        .page-1 .scroll-btn {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 100px;
            height: 40px;
            cursor: pointer;
            z-index: 30;
        }
        .page-1 .scroll-btn img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes breathe {
            0% { transform: translateX(-50%) scale(1); opacity: 1; }
            50% { transform: translateX(-50%) scale(1.1); opacity: 0.8; }
            100% { transform: translateX(-50%) scale(1); opacity: 1; }
        }
        .animate-up { opacity: 0; animation: fadeUp 0.8s forwards; }
        .animate-fade-in { opacity: 0; animation: fadeIn 1s forwards; }
        .animate-breathe { animation: breathe 2s infinite; }
        .top-left-image.animate-fade-in { animation-delay: 0.1s; }
        .title-main.animate-up { animation-delay: 0.2s; }
        .title-sub.animate-up { animation-delay: 0.4s; }
        .divider.animate-up { animation-delay: 0.6s; }
        .desc .animate-up:nth-child(1) { animation-delay: 0.8s; }
        .desc .animate-up:nth-child(2) { animation-delay: 1s; }
        .desc .animate-up:nth-child(3) { animation-delay: 1.2s; }
        .scroll-btn.animate-breathe { animation-delay: 1.5s; }
    </style>
</head>
<body>
    <div class="page page-1" id="page1">
        <div class="top-left-image animate-fade-in">
            <img src="斗拱线稿 1.png" alt="装饰">
        </div>
        <h1 class="title-main animate-up">营造有道 | 御灾有术</h1>
        <h2 class="title-sub animate-up">中国古建筑防灾智慧可视化</h2>
        <div class="divider animate-up"></div>
        <div class="desc">
            <p class="animate-up">华夏营造之术，绵延千载。</p>
            <p class="animate-up">古建栋宇，历风雨、经地震、御洪火，而多存于世。</p>
            <p class="animate-up">其间所蕴结构之理与防灾之智，乃传统工程之精华。</p>
        </div>
        <div class="scroll-btn animate-breathe" onclick="window.location.href='page1.html'">
            <img src="Frame 28.png" alt="下滑">
        </div>
    </div>
</body>
</html>
