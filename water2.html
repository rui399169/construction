<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>防水类型分布</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            font-family: "FZXiaoBiaoSong-B05S", "PingFang SC", sans-serif;
            overflow: hidden;
            background-color: #ffffff;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-image: url('水素材5.png'), url('水背景2.png');
            background-size: cover, cover;
            background-position: bottom, center;
            background-repeat: no-repeat, no-repeat;
        }

        .nav-main {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 3;
        }
        .nav-group {
            flex: 1;
            height: 100%;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid rgba(255,255,255,0.4);
            text-decoration: none;
        }
        .nav-group:hover {
            transform: scale(1.03);
            z-index: 5;
        }
        .nav-group.group-pai {
            background-color: rgba(159, 198, 196, 0.55);
        }
        .nav-group.group-ge {
            background-color: rgba(174, 198, 159, 0.55);
        }
        .nav-group.group-xi {
            background-color: rgba(198, 193, 159, 0.55);
        }
        .nav-text {
            font-size: 250px;
            color: rgba(255,255,255,0.85);
            font-weight: bold;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            .nav-main {
                flex-direction: column;
            }
            .nav-group {
                width: 100%;
                height: 33.33%;
            }
            .nav-text {
                font-size: 100px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-main">
            <div class="nav-group group-pai" onclick="window.location.href='water3.html'">
                <div class="nav-text">排</div>
            </div>
            <div class="nav-group group-ge" onclick="window.location.href='water4.html'">
                <div class="nav-text">隔</div>
            </div>
            <div class="nav-group group-xi" onclick="window.location.href='water5.html'">
                <div class="nav-text">吸</div>
            </div>
        </div>
    </div>
</body>
</html>
