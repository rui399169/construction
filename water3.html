<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>防水智慧 · 七大场景</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 100vw; height: 100vh; overflow: hidden;
            font-family: "FZXiaoBiaoSong-B05S", "PingFang SC", sans-serif;
            background-color: #ffffff;
            background-image: url("水灾背景2.png");
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
        }
        .container { position: relative; width: 100%; height: 100%; }

        /* 导航视图 */
        .nav-view {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
            opacity: 1; visibility: visible;
            transition: opacity 0.4s ease, visibility 0s 0s;
        }
        .nav-view.hidden {
            opacity: 0; visibility: hidden;
            transition: opacity 0.4s ease, visibility 0s 0.4s;
        }
        .water-image {
            position: absolute; top: 15%; left: 6%;
            width: 1400px; height: auto; z-index: 0;
        }
        .water-image img { width: 100%; height: auto; }

        .circle-group {
            position: absolute;
            width: 60px; height: 60px;
            cursor: pointer; z-index: 3;
            animation: pulse 1.2s infinite alternate;
        }
        .circle-group:nth-child(2) { top: 350px; left: 500px;  animation-delay: 0.0s; }
        .circle-group:nth-child(3) { top: 230px; left: 900px;  animation-delay: 0.17s; }
        .circle-group:nth-child(4) { top: 380px; left: 850px;  animation-delay: 0.34s; }
        .circle-group:nth-child(5) { top: 650px; left: 880px;  animation-delay: 0.51s; }
        .circle-group:nth-child(6) { top: 830px; left: 660px;  animation-delay: 0.68s; }
        .circle-group:nth-child(7) { top: 380px; left: 1320px; animation-delay: 0.85s; }
        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.92); }
            100% { opacity: 1; transform: scale(1.06); }
        }
        .outer-circle {
            width: 100%; height: 100%;
            border: 5px solid #fff; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-sizing: border-box;
            transition: border-color 0.3s, box-shadow 0.3s;
            box-shadow: 0 0 15px #fff;
        }
        .circle-group:hover .outer-circle { box-shadow: 0 0 30px rgba(255,255,255,0.8); }
        .inner-circle {
            width: 42%; height: 42%; background: #fff;
            border-radius: 50%;
            transition: background 0.3s, box-shadow 0.3s;
            box-shadow: 0 0 10px rgba(255,255,255,0.6);
        }
        .circle-group:hover .inner-circle { box-shadow: 0 0 20px rgba(255,255,255,0.9); }

        /* 场景视图（全屏背景图） */
        .scene {
            position: absolute; top: 0; left: 0;
            width: 100vw; height: 100vh;
            opacity: 0; visibility: hidden; z-index: 5;
            transition: opacity 0.5s ease, visibility 0s 0.5s;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }
        .scene.active {
            opacity: 1; visibility: visible;
            transition: opacity 0.5s ease, visibility 0s 0s;
        }

        /* 各场景背景图（请确保图片文件存在于同目录下） */
        #scene1 { background-image: url('坡屋面.png'); }
        #scene2 { background-image: url('瓦系.png'); }
        #scene3 { background-image: url('天井1.png'); }
        #scene4 { background-image: url('天井2.png'); }
        #scene5 { background-image: url('通风口.png'); }
        #scene6 { background-image: url('沟渠.png'); } /* 补充第七个场景的背景图 */

        /* 底部导航按钮（修正位置） */
        .nav-buttons {
            position: fixed; bottom: 30px; left: 0; right: 0;
            z-index: 20; pointer-events: none;
        }
        .nav-img-btn {
            position: absolute;
            cursor: pointer;
            transition: transform 0.3s, opacity 0.5s;
            pointer-events: auto;
            opacity: 0;
        }
        .nav-img-btn.visible { opacity: 1; }
        .nav-img-btn.back-btn {
            right: 50px;          /* 左下角 */
            top: -900px;
            width: 60px; height: 80px;
        }
        .nav-img-btn.next-btn {
            left: 100px;         /* 右下角 */
            bottom: 0;
            width: 80px; height: 60px;
        }
        .nav-img-btn:hover { transform: scale(1.1); }
    </style>
</head>
<body>
<div class="container">
    <!-- 导航视图 -->
    <div class="nav-view" id="navView">
        <div class="water-image">
            <img src="水房.png" alt="水房">
        </div>
        <div class="circle-group" onclick="showScene(1)"><div class="outer-circle"><div class="inner-circle"></div></div></div>
        <div class="circle-group" onclick="showScene(2)"><div class="outer-circle"><div class="inner-circle"></div></div></div>
        <div class="circle-group" onclick="showScene(3)"><div class="outer-circle"><div class="inner-circle"></div></div></div>
        <div class="circle-group" onclick="showScene(4)"><div class="outer-circle"><div class="inner-circle"></div></div></div>
        <div class="circle-group" onclick="showScene(5)"><div class="outer-circle"><div class="inner-circle"></div></div></div>
        <div class="circle-group" onclick="showScene(6)"><div class="outer-circle"><div class="inner-circle"></div></div></div>
        <div class="circle-group" onclick="showScene(7)"><div class="outer-circle"><div class="inner-circle"></div></div></div>
    </div>

    <!-- 七个全屏场景 -->
    <div id="scene1" class="scene"></div>
    <div id="scene2" class="scene"></div>
    <div id="scene3" class="scene"></div>
    <div id="scene4" class="scene"></div>
    <div id="scene5" class="scene"></div>
    <div id="scene6" class="scene"></div>
    <div id="scene7" class="scene"></div>

    <!-- 底部导航按钮 -->
    <div class="nav-buttons">
        <img class="nav-img-btn back-btn" src="水返回.png" alt="返回总览" onclick="goBackToNav()">
        <img class="nav-img-btn next-btn" src="水下一章.png" alt="下一场景" onclick="goNextScene()">
    </div>
</div>

<script>
    let currentScene = null;
    let buttonsRevealed = false;

    function showScene(sceneNum) {
        document.getElementById('navView').classList.add('hidden');
        document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
        const target = document.getElementById(`scene${sceneNum}`);
        if (target) {
            target.classList.add('active');
            currentScene = sceneNum;
            setNavButtonsVisibility(false);
            buttonsRevealed = false;
        }
    }

    function goBackToNav() {
        // 如果当前在导航视图（currentScene为null），则跳转到water1.html的scene3
        if (currentScene === null) {
            window.location.href = 'water2.html';
            return;
        }
        // 否则返回导航视图
        document.querySelectorAll('.scene').forEach(s => s.classList.remove('active'));
        document.getElementById('navView').classList.remove('hidden');
        currentScene = null;
        document.querySelector('.back-btn').classList.add('visible');
        document.querySelector('.next-btn').classList.remove('visible');
        buttonsRevealed = false;
    }

    function goNextScene() {
        if (!currentScene) return;
        let next = currentScene + 1;
        if (next > 7) next = 1;
        showScene(next);
    }

    function setNavButtonsVisibility(visible) {
        const backBtn = document.querySelector('.back-btn');
        const nextBtn = document.querySelector('.next-btn');
        if (visible) {
            backBtn.classList.add('visible');
            nextBtn.classList.add('visible');
        } else {
            backBtn.classList.remove('visible');
            nextBtn.classList.remove('visible');
        }
    }

    // 下滑显示按钮
    window.addEventListener('wheel', (e) => {
        if (currentScene && !buttonsRevealed && e.deltaY > 0) {
            setNavButtonsVisibility(true);
            buttonsRevealed = true;
        }
    }, { passive: true });

    let touchStartY = 0;
    window.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; }, { passive: true });
    window.addEventListener('touchend', (e) => {
        if (!currentScene || buttonsRevealed) return;
        const touchEndY = e.changedTouches[0].clientY;
        if (touchStartY - touchEndY > 40) {
            setNavButtonsVisibility(true);
            buttonsRevealed = true;
        }
    });

    // 初始化：导航视图只显示返回按钮
    window.addEventListener('load', () => {
        document.querySelector('.back-btn').classList.add('visible');
        document.querySelector('.next-btn').classList.remove('visible');
    });
</script>
</body>
</html>
