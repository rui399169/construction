<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>防水智慧 · 入口</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 100vw; height: 100vh; overflow: hidden;
            font-family: "FZXiaoBiaoSong-B05S", "PingFang SC", sans-serif;
            background-color: #ffffff;
            background-image: url("水灾背景2.png");
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
        }
        .container { position: relative; width: 100%; height: 100%; }

        /* 初始界面 */
        .nav-view {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
            opacity: 1; visibility: visible;
            transition: opacity 0.4s ease, visibility 0s 0s;
        }
        .nav-view.hidden { opacity: 0; visibility: hidden; transition: opacity 0.4s ease, visibility 0s 0.4s; }

        .water-image {
            position: absolute; top: 15%; left: 15%;
            width: 1400px; height: auto; z-index: 0;
        }
        .water-image img { width: 100%; height: auto; }

        .circle-group {
            position: absolute;
            top: 400px; left: 500px;
            width: 60px; height: 60px;
            cursor: pointer; z-index: 3;
            animation: pulse 1.2s infinite alternate;
        }
        @keyframes pulse {
            0% { opacity: 0.4; transform: scale(0.92); }
            100% { opacity: 1; transform: scale(1.06); }
        }
        .outer-circle {
            width: 100%; height: 100%;
            border: 5px solid #fff; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-sizing: border-box; transition: border-color 0.3s, box-shadow 0.3s;
            box-shadow: 0 0 15px #fff;
        }
        .circle-group:hover .outer-circle { box-shadow: 0 0 30px rgba(255,255,255,0.8); }
        .inner-circle {
            width: 42%; height: 42%; background: #fff; border-radius: 50%;
            transition: background 0.3s, box-shadow 0.3s; box-shadow: 0 0 10px rgba(255,255,255,0.6);
        }
        .circle-group:hover .inner-circle { box-shadow: 0 0 20px rgba(255,255,255,0.9); }

        /* 全屏可滚动长图页面 */
        .detail-overlay {
            position: fixed; top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: #fff;
            z-index: 10;
            opacity: 0; visibility: hidden;
            transition: opacity 0.5s ease, visibility 0s 0.5s;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .detail-overlay.active { opacity: 1; visibility: visible; transition: opacity 0.5s ease, visibility 0s 0s; }

        /* 长图容器（相对定位，作为底部组件的参考） */
        .long-image-wrapper {
            position: relative;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .long-image-wrapper img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* ---------- 底部组件（放置在图片底部，不超出图片边界） ---------- */
        .group161 {
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            width: 100%;
            max-width: 1050px;
            height: 91px;
            z-index: 30;
            box-sizing: border-box;
            padding: 0 10px; /* 可选，防止线条紧贴边缘 */
        }

        .vector33 {
            margin-top: 46px;
            width: 556px;
            height: 1px;
            background-image: linear-gradient(
                90deg,
                rgba(113, 108, 108, 0.15) 0%,
                rgba(111, 96, 96, 0.375) 33.65%,
                rgba(107, 75, 75, 1) 100%
            );
        }

        .rectangle134 {
            display: flex;
            align-items: center;
            border: 1px solid #716c6c;
            padding: 7px;
        }

        .rectangle132 {
            display: flex;
            flex-grow: 1;
            align-items: center;
            box-shadow: 0px 4px 4px 0px rgba(103, 92, 92, 0.25);
            background: #8c8686;
            padding: 11px;
            cursor: pointer;
            transition: transform 0.6s ease;
        }
        .rectangle132:hover {
            transform: rotate(180deg);
        }

        /* 文字需要单独过渡，并反向旋转抵消父级旋转 */
        .rectangle132 .btn-text {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 53px;
            height: 53px;
            line-height: 80px;
            letter-spacing: 0;
            color: #ffffff;
            font-family: "FZXiaoBiaoSong-B05S", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", SimHei, Arial, Helvetica, sans-serif;
            font-size: 36px;
            margin: 0;
            transition: transform 0.6s ease;
        }
        .rectangle132:hover .btn-text {
            transform: rotate(-180deg);   /* 反向旋转，保持文字不动 */
        }

        .vector34 {
            margin-top: 46px;
            width: 556px;
            height: 1px;
            transform: rotate(180deg);
            background-image: linear-gradient(
                90deg,
                rgba(113, 108, 108, 0.15) 0%,
                rgba(111, 96, 96, 0.375) 33.65%,
                rgba(107, 75, 75, 1) 100%
            );
        }
    </style>
</head>
<body>
<div class="container">
    <!-- 初始底图与圆点 -->
    <div class="nav-view" id="navView">
        <div class="water-image">
            <img src="吸.png" alt="底图">
        </div>
        <div class="circle-group" onclick="showDetail()">
            <div class="outer-circle"><div class="inner-circle"></div></div>
        </div>
    </div>

    <!-- 可滚动长图页面 -->
    <div class="detail-overlay" id="detailOverlay">
        <div class="long-image-wrapper">
            <img src="吸水.png" alt="详细内容长图">
            <!-- 底部返回组件（置于图片底部，不超出图片） -->
            <div class="group161">
                <div class="vector33"></div>
                <div class="rectangle134">
                    <div class="rectangle132" onclick="window.location.href='Page2.html'">
                        <p class="btn-text">返</p>
                    </div>
                </div>
                <div class="vector34"></div>
            </div>
        </div>
    </div>
</div>

<script>
    function showDetail() {
        document.getElementById('navView').classList.add('hidden');
        document.getElementById('detailOverlay').classList.add('active');
    }

    function goBackToNav() {
        document.getElementById('detailOverlay').classList.remove('active');
        document.getElementById('navView').classList.remove('hidden');
    }
</script>
</body>
</html>
