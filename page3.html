<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>营造有道 | 御灾有术</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html,
        body {
            width: 100%;
            height: 100%;
            font-family: "FZXiaoBiaoSong-B05S", "SimSun", serif;
            background-color: #F5F1EB;
            overflow: hidden;
        }
        .page {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }
        .page-4 {
            transform: translateX(0);
            opacity: 1;
            background-image: url("背景3.png");
            background-position: center;
            background-size: cover;
            background-repeat: no-repeat;
        }
        .page-4 .title-image {
            position: absolute;
            top: 200px;
            left: 125px;
            width: 759px;
            height: 521.63px;
            z-index: 10;
        }
        .page-4 .title-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .page-4 .quote-box-image {
            position: absolute;
            top: 50%;
            right: 50px;
            transform: translateY(-50%);
            width: 723px;
            height: 378px;
            z-index: 10;
        }
        .page-4 .quote-box-image img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .chapter-btn {
            position: absolute;
            bottom: 54px;
            z-index: 999;
            cursor: pointer;
            height: 40px;
        }
        .chapter-btn img {
            height: 100%;
            width: auto;
        }
        .prev-chapter-btn {
            left: 192px;
        }
        .next-chapter-btn {
            right: 192px;
            display: none;  
        }
         /* ---------- 底部组件 ---------- */
        .group161 {
            position: absolute;
            bottom: 35px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            width: 1050px;
            height: 91px;
            z-index: 30;
        }

        .vector33 {
            margin-top: 46px;
            width: 556px;
            height: 1px;
            background-image: linear-gradient(
                90deg,
                rgba(113, 108, 108, 0.15) 0%,
                rgba(111, 96, 96, 0.375) 33.65%,
                rgba(107, 75, 75, 1) 100%
            );
        }

        .rectangle134 {
            display: flex;
            align-items: center;
            border: 1px solid #716c6c;
            padding: 7px;
        }

        .rectangle132 {
            display: flex;
            flex-grow: 1;
            align-items: center;
            box-shadow: 0px 4px 4px 0px rgba(103, 92, 92, 0.25);
            background: #8c8686;
            padding: 11px;
            cursor: pointer;
            transition: transform 0.6s ease;
        }
        .rectangle132:hover {
            transform: rotate(180deg);
        }


        .text {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 53px;
            height: 53px;
            line-height: 80px;
            letter-spacing: 0;
            color: #ffffff;
            font-family: "FZXiaoBiaoSong-B05S", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", SimHei, Arial, Helvetica, sans-serif;
            font-size: 36px;
            margin: 0;
            transition: transform 0.6s ease;
        }
        .rectangle132:hover .text {
            transform: rotate(-180deg); 
        }

        .vector34 {
            margin-top: 46px;
            width: 556px;
            height: 1px;
            transform: rotate(180deg);
            background-image: linear-gradient(
                90deg,
                rgba(113, 108, 108, 0.15) 0%,
                rgba(111, 96, 96, 0.375) 33.65%,
                rgba(107, 75, 75, 1) 100%
            );
        }
    </style>
</head>
<body>
    <div class="page page-4" id="page4">
        <div class="title-image">
            <img src="标题3.png" alt="标题3">
        </div>
        <div class="quote-box-image">
            <img src="火灾.png" alt="火灾">
        </div>

                <div class="group161">
            <div class="vector33"></div>
            <div class="rectangle134">
                <div class="rectangle132" onclick="window.location.href='fire1.html'">
                    <p class="text">观</p>
                </div>
            </div>
            <div class="vector34"></div>
        </div>

        <div class="chapter-btn prev-chapter-btn" onclick="window.location.href='page2.html'">
            <img src="上一章.png" alt="上一章">
        </div>
        <div class="chapter-btn next-chapter-btn">
            <img src="下一章.png" alt="下一章">
        </div>
    </div>
</body>
</html>
